<h2 mat-dialog-title>Compose Email</h2>

<mat-dialog-content class="mat-typography pt-2">
    <div class="row">
        <div class="col-12">
            <mat-form-field class="w-100 mt-2" appearance="outline">
                <mat-label>To</mat-label>
                <input matInput type="email" [(ngModel)]="toEmail" placeholder="Recipient Email" />
            </mat-form-field>
        </div>
        <div class="col-12">
            <mat-form-field class="w-100 mt-2" appearance="outline">
                <mat-label>Subject</mat-label>
                <input matInput type="text" [(ngModel)]="subject" placeholder="Email Subject" />
            </mat-form-field>
        </div>
        <div class="col-12">
            <mat-form-field class="w-100 mt-2" appearance="outline">
                <mat-label>Message</mat-label>
                <textarea matInput rows="6" [(ngModel)]="message" placeholder="Type your message here..."></textarea>
            </mat-form-field>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions class="d-flex justify-content-end gap-2 w-100 p-3 m-0">
    <button matButton class="btn btn-outline-dark" mat-dialog-close>
        Cancel
    </button>
    <button matButton class="btn btn-dark" (click)="sendEmail()" [disabled]="isSending || !toEmail || !subject || !message" cdkFocusInitial>
        @if (isSending) {
            <app-button-spinner></app-button-spinner>
        } @else {
            Send
        }
    </button>
</mat-dialog-actions>
