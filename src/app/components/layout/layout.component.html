<div class="w-100">
    <!-- navbar starts -->
<nav>
<div class="navbar text-white">
<div class="d-flex p-2 fs-5 ms-4">
    <strong>ONE</strong>APP <br> <span class="text-secondary">ADMIN</span>
</div>
<div class="d-flex gap-2 align-items-center">
  @if(showAlarm) {
  <div class="me-2" (click)="stopAlarm()">
  <img style="width: 30px" src="assets/vecteezy_3d-megaphone-speaker-or-loudspeaker-bullhorn-for-announce_9315292.png" alt="">
</div>
  }
  @if(isConnected) {
    <div class="connected" style="cursor: pointer;" title="Looking for orders" (click)="openAlert(connected)"></div>
  } @else {
    <div class="disconnected" title="disconnected" (click)="openAlert(disconnected)"></div>
  }
<div class="me-1" style="cursor: pointer;" (click)="openDialog()">
  <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#FFFFFF"><path d="M513.5-254.5Q528-269 528-290t-14.5-35.5Q499-340 478-340t-35.5 14.5Q428-311 428-290t14.5 35.5Q457-240 478-240t35.5-14.5ZM442-394h74q0-33 7.5-52t42.5-52q26-26 41-49.5t15-56.5q0-56-41-86t-97-30q-57 0-92.5 30T342-618l66 26q5-18 22.5-39t53.5-21q32 0 48 17.5t16 38.5q0 20-12 37.5T506-526q-44 39-54 59t-10 73Zm38 314q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
</div>
@if(!isSettings()){
  <div class="d-flex align-items-center" style="cursor: pointer;" (click)="openSettings()">
  <div class="border me-2" style="border-radius: 7px; padding: 4px 12px"> <img class="me-1" style="width: 25px" src="../../../assets/system-solid-8-account-hover-account (1).gif" alt=""> 
You're a <b>{{role | titlecase}}</b></div>
</div>
}
</div>
</div>
</nav>
<!-- navbar ends -->


<div class="row">
    <!-- sidedbar starts -->
    <div class="col-1"></div>
  <!-- sidedbar ends -->

  <!-- main content starts -->
    <div class="col-11 scroll-container pe-3" style="height: 86vh; overflow-y:scroll; overflow-x: hidden; ">
        <router-outlet></router-outlet>
    </div>
    <!-- main content ends -->
</div>
</div>

<div class="sidebar pe-2 mt-2 position-fixed" style="width: 7vw; top: 50px; top: 54px; overflow-y: auto; height: calc(100vh - 80px); scrollbar-width: none;">
    <ul class="mt-4 ms-2">
      @for(item of sidebarItems; track item){
        <li routerLinkActive="active"
        [routerLinkActiveOptions]="item.routerLinkActiveOptions || { exact: false }"><a [routerLink]="item.routerLink"
         [title]="item.title"><svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#FFFFFF"><path [attr.d]="item.svg"/></svg></a>
        @if(item.notification){
          <span class="position-absolute translate-middle p-1 bg-danger rounded-circle">
    <span class="visually-hidden">New alerts</span>
  </span> 
        }
        </li>
      }
    </ul>
  </div>

<footer class="position-fixed bottom-0 w-100 text-center" style="background-color: black; z-index: -1">
    <small class="text-white m-0 p-1" style="font-family: monospace; z-index: -1">&copy;{{year}} demoCompany. All rights reserved. | {{version}}</small>
</footer>
